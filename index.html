<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Alpha</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0D1117 !important; color: #E6EDF3; font-family: system-ui, sans-serif; min-height: 100vh; }
    #root { background: #0D1117; min-height: 100vh; }
    #preload {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0D1117;
    }
    #preload .logo {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, #58A6FF, #BC8CFF, #3FB950);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 24px; font-weight: bold;
      animation: pulse 1.5s ease-in-out infinite;
    }
    #preload .status { margin-top: 16px; font-size: 13px; color: #8B949E; }
    #preload .error { margin-top: 12px; font-size: 12px; color: #F85149; max-width: 400px; text-align: center; display: none; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div id="preload">
    <div class="logo">A</div>
    <div class="status">Loading Aura Alpha...</div>
    <div class="error" id="load-error"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="./src/main.jsx"></script>
  <script>
    // Diagnostic: if React hasn't mounted after 8 seconds, show error
    setTimeout(function() {
      var el = document.getElementById('load-error');
      if (el && document.getElementById('preload')) {
        el.style.display = 'block';
        el.textContent = 'App failed to load. Check DevTools (F12) for errors. Version: 1.1.4';
      }
    }, 8000);
  </script>
</body>
</html>
