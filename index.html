<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Alpha</title>
  <style>
    /* Pre-React loading indicator — visible until React mounts and removes it */
    body { margin: 0; background: #0D1117; }
    #preload {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #0D1117; color: #8B949E; font-family: system-ui, sans-serif;
    }
    #preload .logo {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, #58A6FF, #BC8CFF, #3FB950);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 24px; font-weight: bold;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div id="preload"><div class="logo">A</div></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
