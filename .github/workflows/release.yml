name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-amd64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macos-amd64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci

      # macOS code signing: only pass cert env vars when secret is actually set
      # (empty APPLE_CERTIFICATE causes tauri-action to fail on keychain import)
      - name: Build Tauri app (signed)
        if: matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE != ''
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Aura Alpha Desktop ${{ github.ref_name }}'
          releaseBody: |
            Desktop application for Aura Alpha Trading Desk.

            **Downloads:**
            - Windows: `.msi` or `.exe` (NSIS installer)
            - macOS: `.dmg` (signed + notarized)
            - Linux: `.deb` or `.AppImage`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --target ${{ matrix.target }}

      - name: Build Tauri app (unsigned)
        if: matrix.platform != 'macos-latest' || secrets.APPLE_CERTIFICATE == ''
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Aura Alpha Desktop ${{ github.ref_name }}'
          releaseBody: |
            Desktop application for Aura Alpha Trading Desk.

            **Downloads:**
            - Windows: `.msi` or `.exe` (NSIS installer)
            - macOS: `.dmg`
            - Linux: `.deb` or `.AppImage`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --target ${{ matrix.target }}

      # Upload .sig files that tauri-action misses
      - name: Upload updater signatures
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          # Find all .sig files in the bundle output
          find "$BUNDLE_DIR" -name "*.sig" -type f 2>/dev/null | while read sig; do
            name=$(basename "$sig")
            echo "Uploading signature: $name"
            gh release upload "$TAG" "$sig" --clobber || echo "Warning: failed to upload $name"
          done

          # Also upload updater bundles (.tar.gz, .nsis.zip) if not already uploaded
          for ext in tar.gz nsis.zip; do
            find "$BUNDLE_DIR" -name "*.$ext" -not -name "*.sig" -type f 2>/dev/null | while read bundle; do
              name=$(basename "$bundle")
              echo "Uploading updater bundle: $name"
              gh release upload "$TAG" "$bundle" --clobber || echo "Warning: failed to upload $name (may already exist)"
            done
          done
