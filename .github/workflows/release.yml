name: Build & Release Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build grid worker binary
        run: |
          cd grid_worker
          pip install pyinstaller numpy polars psutil
          pyinstaller --onefile --name aura-grid-worker --clean --noconfirm --hidden-import=numpy --hidden-import=polars --hidden-import=psutil --collect-all polars worker.py

      - name: Place grid worker sidecar (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/binaries
          cp grid_worker/dist/aura-grid-worker src-tauri/binaries/aura-grid-worker-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/aura-grid-worker-x86_64-unknown-linux-gnu

      - name: Place grid worker sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir -p src-tauri/binaries
          cp grid_worker/dist/aura-grid-worker.exe src-tauri/binaries/aura-grid-worker-x86_64-pc-windows-msvc.exe
        shell: bash

      - name: Place grid worker sidecar (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p src-tauri/binaries
          cp grid_worker/dist/aura-grid-worker src-tauri/binaries/aura-grid-worker-aarch64-apple-darwin
          chmod +x src-tauri/binaries/aura-grid-worker-aarch64-apple-darwin

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Aura Alpha v__VERSION__'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
