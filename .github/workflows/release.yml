name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-amd64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macos-amd64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing and notarization (active when secrets are set)
          # To enable macOS signing and notarization:
          # 1. Run scripts/setup-macos-signing.sh to export your Developer ID certificate
          # 2. Base64 encode it: base64 -i certificate.p12 | pbcopy
          # 3. Add GitHub Secrets:
          #    APPLE_CERTIFICATE = <base64 of .p12 file>
          #    APPLE_CERTIFICATE_PASSWORD = <p12 password>
          #    APPLE_SIGNING_IDENTITY = "Developer ID Application: Your Name (TEAMID)"
          #    APPLE_ID = <your Apple ID email>
          #    APPLE_PASSWORD = <app-specific password from appleid.apple.com>
          #    APPLE_TEAM_ID = <10-char team ID from developer.apple.com>
          # The tauri-action will auto-sign and notarize when these are present.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Aura Alpha Desktop ${{ github.ref_name }}'
          releaseBody: |
            Desktop application for Aura Alpha Trading Desk.

            **Downloads:**
            - Windows: `.msi` or `.exe` (NSIS installer)
            - macOS: `.dmg`
            - Linux: `.deb` or `.AppImage`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      # To enable Windows code signing:
      # 1. Buy an OV or EV code signing certificate (.pfx file)
      # 2. Base64 encode it: base64 -i certificate.pfx | pbcopy
      # 3. Add as GitHub Secret: WINDOWS_CERTIFICATE = <base64 string>
      # 4. Add as GitHub Secret: WINDOWS_CERTIFICATE_PASSWORD = <pfx password>
      # The build will auto-sign when these secrets are present.
      - name: Sign Windows executables
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: powershell
        run: |
          # Decode certificate from base64
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:TEMP "code_signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          # Find and sign all .exe and .msi files in the output
          $artifacts = Get-ChildItem -Path "src-tauri/target" -Recurse -Include "*.exe","*.msi" | Where-Object { $_.Length -gt 100000 }

          foreach ($file in $artifacts) {
            Write-Host "Signing: $($file.FullName)"
            & signtool.exe sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 "$($file.FullName)"
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Failed to sign $($file.Name) - continuing..."
            }
          }

          # Clean up
          Remove-Item $certPath -Force

      # Upload .sig files that tauri-action misses
      - name: Upload updater signatures
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          # Debug: show all files in bundle dir
          echo "=== Bundle dir contents ==="
          find "$BUNDLE_DIR" -type f -name "*.sig" -o -name "*.tar.gz" -o -name "*.nsis.zip" 2>/dev/null || true
          echo "=== End ==="

          # Upload all .sig files (use find with exec to avoid glob/subprocess issues)
          find "$BUNDLE_DIR" -type f -name "*.sig" -exec sh -c '
            for sig; do
              name=$(basename "$sig")
              echo "Uploading signature: $name"
              gh release upload "'"$TAG"'" "$sig" --clobber || echo "Warning: failed to upload $name"
            done
          ' _ {} +

          # Upload updater bundles (.tar.gz, .nsis.zip) not already uploaded
          find "$BUNDLE_DIR" -type f \( -name "*.tar.gz" -o -name "*.nsis.zip" \) ! -name "*.sig" -exec sh -c '
            for bundle; do
              name=$(basename "$bundle")
              echo "Uploading updater bundle: $name"
              gh release upload "'"$TAG"'" "$bundle" --clobber || echo "Warning: failed to upload $name (may already exist)"
            done
          ' _ {} +
