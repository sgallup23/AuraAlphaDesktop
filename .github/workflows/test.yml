name: Test Desktop Build
on:
  pull_request:
    branches: [master, main]
jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build
      # Don't build Tauri on PR -- just verify frontend compiles
